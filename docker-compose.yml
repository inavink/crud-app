version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: crud_app_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Navin070526
      MYSQL_DATABASE: crud_app
    volumes:
      - /var/lib/mysql:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crud_app_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: Navin070526
      DB_NAME: crud_app
      JWT_SECRET: change_this_secret
      JWT_EXPIRES_IN: 1h
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crud_app_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  db_data:
